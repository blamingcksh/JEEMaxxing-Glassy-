<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>JEEMaxxing · Growth Forest Lab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --amber:#ffb224; --amber2:#ff7a1a; --cyan:#3ddcff; --violet:#a78bfa;
    --ink:#eef1f6; --dim:#9aa3b5; --line:rgba(255,255,255,.10);
    --glass:linear-gradient(180deg, rgba(16,18,28,.82), rgba(10,12,19,.88));
    --disp:'Chakra Petch',sans-serif; --num:'Space Grotesk',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden;background:#08090d;color:var(--ink);
    font-family:var(--disp);-webkit-font-smoothing:antialiased}
  #forest-canvas{position:fixed;inset:0;display:block;touch-action:none;
    filter:saturate(1.5) contrast(1.08)}

  .hud-panel{position:fixed;background:var(--glass);
    -webkit-backdrop-filter:blur(16px) saturate(140%);backdrop-filter:blur(16px) saturate(140%);
    border:1px solid var(--line);border-radius:18px;padding:16px 18px;z-index:10;
    box-shadow:0 20px 50px -20px rgba(0,0,0,.85), inset 0 1px 0 rgba(255,255,255,.08)}
  #panel-top{top:20px;left:20px;width:262px}
  #panel-bottom{bottom:20px;left:50%;transform:translateX(-50%);
    display:flex;gap:18px;align-items:center;flex-wrap:wrap;justify-content:center;max-width:94vw}

  .kicker{font-size:9.5px;font-weight:700;letter-spacing:2.6px;color:var(--cyan);opacity:.9}
  #panel-top h1{font-size:22px;font-weight:700;letter-spacing:.5px;margin:2px 0 3px;
    background:linear-gradient(180deg,#fff,#c7cde0);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  #period-lbl{font-family:var(--num);font-size:10px;letter-spacing:1.4px;color:var(--dim);margin-bottom:12px}

  .seg{display:flex;gap:4px;padding:3px;border-radius:11px;background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.07);margin-bottom:14px}
  .seg button{flex:1;padding:7px 4px;border:none;border-radius:8px;cursor:pointer;
    font-family:var(--disp);font-size:11px;font-weight:700;letter-spacing:.6px;color:var(--dim);
    background:transparent;transition:all .15s}
  .seg button:hover{color:#fff;background:rgba(255,255,255,.06)}
  .seg button.active{color:#171207;background:linear-gradient(100deg,var(--amber),var(--amber2));
    box-shadow:0 2px 12px rgba(255,122,26,.4)}

  .legend{display:flex;flex-direction:column;gap:7px;margin-bottom:14px}
  .lg-row{display:flex;align-items:center;gap:9px;font-size:12px;font-weight:600;color:var(--dim)}
  .lg-row b{margin-left:auto;font-family:var(--num);color:#fff;font-size:13px}
  .dot{width:10px;height:10px;border-radius:3px;flex:0 0 auto;box-shadow:0 0 8px currentColor}

  .stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
  .stat{background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:11px;padding:9px 11px}
  .stat.wide{grid-column:1/-1}
  .stat .v{font-family:var(--num);font-size:19px;font-weight:700;color:#fff;line-height:1.1}
  .stat .v.oaks{color:#c4b5fd;text-shadow:0 0 12px rgba(196,181,253,.4)}
  .stat .l{font-size:8.5px;letter-spacing:1.3px;color:var(--dim);text-transform:uppercase;margin-top:2px}
  .stat .v.grow{color:#4ade80}

  .ctrl{display:flex;flex-direction:column;gap:6px;min-width:170px}
  .ctrl label{font-size:9px;letter-spacing:1.6px;color:var(--dim);font-weight:700}
  input[type=range]{-webkit-appearance:none;appearance:none;height:6px;border-radius:99px;
    background:linear-gradient(90deg,#1a2030,#3a4a6a,#e8956a,#4a7ec0,#e07a44,#1a2030);outline:none;cursor:pointer}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;
    background:#fff;box-shadow:0 0 0 3px rgba(255,178,36,.5),0 2px 6px rgba(0,0,0,.5)}
  input[type=range]::-moz-range-thumb{width:16px;height:16px;border:none;border-radius:50%;background:#fff;
    box-shadow:0 0 0 3px rgba(255,178,36,.5)}

  .toggle{padding:9px 15px;border-radius:11px;cursor:pointer;font-family:var(--disp);font-size:11.5px;
    font-weight:700;letter-spacing:.5px;color:#e2e8f0;background:rgba(255,255,255,.05);
    border:1px solid var(--line);transition:all .15s;white-space:nowrap}
  .toggle:hover{border-color:rgba(255,178,36,.5);color:#fff}
  .toggle.on{background:rgba(255,178,36,.16);border-color:var(--amber);color:#ffd9a0;
    box-shadow:0 0 14px rgba(255,178,36,.3)}

  #tooltip{position:fixed;z-index:20;pointer-events:none;opacity:0;transition:opacity .12s;
    background:var(--glass);-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);
    border:1px solid var(--line);border-radius:12px;padding:10px 13px;min-width:150px;
    box-shadow:0 14px 34px -12px rgba(0,0,0,.85);transform:translate(-50%,calc(-100% - 14px))}
  #tooltip .tt-sub{font-size:9px;letter-spacing:1.5px;font-weight:700;text-transform:uppercase}
  #tooltip .tt-tier{font-size:14px;font-weight:700;color:#fff;margin:2px 0}
  #tooltip .tt-meta{font-family:var(--num);font-size:11px;color:var(--dim)}

  #loading{position:fixed;inset:0;z-index:50;background:#08090d;display:flex;flex-direction:column;
    gap:18px;align-items:center;justify-content:center;transition:opacity .6s;font-size:12px;
    letter-spacing:2px;color:var(--dim)}
  #loading.gone{opacity:0;pointer-events:none}
  .loader{width:42px;height:42px;border-radius:50%;border:3px solid rgba(255,178,36,.15);
    border-top-color:var(--amber);animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  #boot-log{margin-top:6px;max-height:130px;overflow:auto;font-size:10px;line-height:1.55;
    letter-spacing:.4px;color:#5b6478;text-align:left;width:360px;max-width:82vw;
    font-family:var(--num);white-space:pre-wrap}
  #boot-log div{padding:1px 0}

  @media (max-width:640px){
    #panel-top{width:calc(100vw - 32px);left:16px;top:16px}
    #panel-bottom{bottom:14px;gap:12px;padding:12px 14px}
  }
</style>
</head>
<body>
<canvas id="forest-canvas"></canvas>

<div class="hud-panel" id="panel-top">
  <div class="kicker">// TELEMETRY BIOME</div>
  <h1>GROWTH FOREST</h1>
  <div id="period-lbl">LAST 365 DAYS</div>
  <div class="seg" id="range-seg">
    <button data-range="week">WEEK</button>
    <button data-range="month">MONTH</button>
    <button data-range="year" class="active">YEAR</button>
    <button data-range="all">ALL</button>
  </div>
  <div class="legend" id="legend"></div>
  <div class="stats">
    <div class="stat"><div class="v" id="st-total">0</div><div class="l">Trees Standing</div></div>
    <div class="stat"><div class="v grow" id="st-growth">+0</div><div class="l">This Period</div></div>
    <div class="stat"><div class="v oaks" id="st-oaks">0</div><div class="l">Ancient Oaks</div></div>
    <div class="stat wide"><div class="v" id="st-tall">—</div><div class="l">Tallest Specimen (qElo)</div></div>
  </div>
</div>

<div class="hud-panel" id="panel-bottom">
  <div class="ctrl">
    <label>TIME OF DAY</label>
    <input type="range" id="tod" min="0" max="100" value="30">
  </div>
  <button id="rotate-btn" class="toggle on">⟳ ORBIT</button>
  <button id="regrow-btn" class="toggle">↻ REGROW</button>
</div>

<div id="tooltip"></div>
<div id="loading"><div class="loader"></div><div>SOWING SEEDS…</div><div id="boot-log"></div></div>

<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
} }
</script>

<script type="module">
/* ═══════════════════ RESILIENT BOOT LOADER ═══════════════════ */
const logEl  = document.getElementById('boot-log');
const loadEl = document.getElementById('loading');
function log(m){ console.log('[forest]', m); if(logEl){ const d=document.createElement('div'); d.textContent='› '+m; logEl.appendChild(d); logEl.scrollTop=logEl.scrollHeight; } }
function fatal(m, e){
  console.error('[forest] FATAL', m, e);
  if(loadEl){ loadEl.classList.remove('gone'); loadEl.innerHTML =
    '<div style="max-width:540px;padding:0 22px;text-align:left">'+
    '<div style="font-size:13px;letter-spacing:2px;color:#f87171;margin-bottom:12px">⚠ FOREST FAILED TO BOOT</div>'+
    '<div style="font-size:12px;color:#cbd5e1;line-height:1.65;white-space:pre-wrap;font-family:var(--num)">'+m+
    (e&&e.message?('\n\n— '+e.message):'')+
    (e&&e.stack?('\n\n'+e.stack.split('\n').slice(0,5).join('\n')):'')+
    '</div><div style="font-size:11px;color:#64748b;margin-top:14px">Open DevTools → Console / Network for the full trace.</div></div>'; }
}
window.addEventListener('error', e=>fatal('Uncaught error: '+(e.message||e.error), e.error));
window.addEventListener('unhandledrejection', e=>fatal('Unhandled rejection: '+(e.reason&&(e.reason.message||e.reason)), e.reason));
const WATCH = setTimeout(()=>{ if(!window.__forestBooted) fatal('Timed out (15s) waiting for the 3D engine. The CDN hosting Three.js is likely blocked or very slow on your network.'); }, 15000);

async function imp(name, spec){ log('load '+name+'  ←  '+spec); const m=await import(spec); log('✓ '+name); return m; }
async function loadEngine(){
  try{
    const [THREE, oc, bu] = await Promise.all([
      imp('three',         'https://esm.sh/three@0.160.0'),
      imp('OrbitControls', 'https://esm.sh/three@0.160.0/examples/jsm/controls/OrbitControls.js'),
      imp('mergeGeometries','https://esm.sh/three@0.160.0/examples/jsm/utils/BufferGeometryUtils.js'),
    ]);
    return { THREE, OrbitControls: oc.OrbitControls, mergeGeometries: bu.mergeGeometries, via:'esm.sh' };
  }catch(e1){
    log('esm.sh failed ('+(e1&&e1.message||e1)+') → fallback to jsdelivr (import map)');
    const [THREE, oc, bu] = await Promise.all([
      imp('three',         'three'),
      imp('OrbitControls', 'three/addons/controls/OrbitControls.js'),
      imp('mergeGeometries','three/addons/utils/BufferGeometryUtils.js'),
    ]);
    return { THREE, OrbitControls: oc.OrbitControls, mergeGeometries: bu.mergeGeometries, via:'jsdelivr' };
  }
}

(async()=>{
  try{
    log('booting Growth Forest lab…');
    const { THREE, OrbitControls, mergeGeometries, via } = await loadEngine();
    log('engine ready via '+via+' — building scene…');
    buildScene(THREE, OrbitControls, mergeGeometries);
    window.__forestBooted = true;
    clearTimeout(WATCH);
    log('✓ running');
  }catch(e){
    clearTimeout(WATCH);
    fatal('Could not load or build the 3D scene.', e);
  }
})();

/* ═══════════════════ SCENE ═══════════════════ */
function buildScene(THREE, OrbitControls, mergeGeometries){

/* non-blocking toast for skipped OPTIONAL features. The base forest always
   renders; if an enhancement throws we surface the exact line here instead
   of ever blanking the screen. */
function warn(msg){
  console.warn('[forest] skipped:', msg);
  try{
    const d=document.createElement('div');
    d.textContent='⚠ '+msg;
    Object.assign(d.style,{position:'fixed',left:'50%',bottom:'14px',transform:'translateX(-50%)',
      zIndex:'60',background:'rgba(20,16,8,.92)',border:'1px solid rgba(255,178,36,.4)',
      color:'#ffd9a0',padding:'8px 14px',borderRadius:'10px',font:'12px/1.4 monospace',
      maxWidth:'88vw',boxShadow:'0 8px 24px rgba(0,0,0,.6)',pointerEvents:'none'});
    document.body.appendChild(d);
    setTimeout(()=>{ d.style.transition='opacity .5s'; d.style.opacity='0'; setTimeout(()=>{ if(d.parentNode) d.parentNode.removeChild(d); },600); },6500);
  }catch(_){}
}

const CFG = { terrainSize:168, terrainSeg:120, waterLevel:-1.1, treeSpacing:2.3, maxSlope:0.6, fogDensity:0.010 };
const OAK_THRESHOLD = 2300;   // qElo at which a solve grows into a towering Dark Oak
const GRASS_N       = 9000;   // ground-cover blade clumps
/* outer-scope so the animate loop can guard against skipped optional passes */
let grassMat = null;
let birdsMat = null, birdMesh = null, birdData = null, _birdDummy = null;
let lastTOD = 30;   // remembered so the streak-mood can re-derive the sky base
const SUBJECTS = {
  physics:   { label:'Physics',   color:new THREE.Color(0.30,0.78,0.86) },
  chemistry: { label:'Chemistry', color:new THREE.Color(0.36,0.82,0.42) },
  maths:     { label:'Maths',     color:new THREE.Color(0.98,0.70,0.26) },
};
const css = c => `rgb(${c.r*255|0},${c.g*255|0},${c.b*255|0})`;

/* ── mock data (swap for the AppState adapter in Phase 2) ── */
function generateMockData(){
  const out=[], now=Date.now(), D=86400000, subs=Object.keys(SUBJECTS);
  for(let d=365; d>=0; d--){
    const date=new Date(now-d*D), dow=date.getDay();
    const base=(dow===0||dow===6)?3:6;
    const n=Math.max(0, Math.round(base + Math.sin(d*0.3)*2 + (Math.random()-0.5)*4));
    for(let i=0;i<n;i++){
      out.push({ id:out.length, ts:date.getTime()+Math.random()*D,
        subject:subs[Math.random()*3|0],
        qElo:Math.min(2800, 900 + Math.random()*1300 + (365-d)*1.6),
        chapter:'Ch. '+(1+(Math.random()*12|0)) });
    }
  }
  return out.sort((a,b)=>a.ts-b.ts);
}
const TREES = generateMockData();

/* ── noise + terrain ── */
function hash(x,z){ const n=Math.sin(x*127.1+z*311.7)*43758.5453; return n-Math.floor(n); }
function vnoise(x,z){
  const xi=Math.floor(x),zi=Math.floor(z),xf=x-xi,zf=z-zi;
  const u=xf*xf*(3-2*xf),v=zf*zf*(3-2*zf);
  const a=hash(xi,zi),b=hash(xi+1,zi),c=hash(xi,zi+1),d=hash(xi+1,zi+1);
  return a*(1-u)*(1-v)+b*u*(1-v)+c*(1-u)*v+d*u*v;
}
function heightAt(x,z){
  let h=(vnoise(x*0.035,z*0.035)-0.5)*8 + (vnoise(x*0.09,z*0.09)-0.5)*2.5 + (vnoise(x*0.2,z*0.2)-0.5)*0.8;
  const d=Math.hypot(x+9,z-7); h-=Math.max(0,3.4-d*0.5);
  return h;
}

/* ── renderer / scene / camera ── */
const canvas=document.getElementById('forest-canvas');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.outputColorSpace=THREE.SRGBColorSpace;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.2;

const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x9ab4c8, CFG.fogDensity);

const camera=new THREE.PerspectiveCamera(52, innerWidth/innerHeight, 0.1, 600);
camera.position.set(52,34,60);
const controls=new OrbitControls(camera,canvas);
controls.target.set(0,2,0);
controls.enableDamping=true; controls.dampingFactor=0.06;
controls.minDistance=12; controls.maxDistance=160;
controls.maxPolarAngle=1.5; controls.autoRotate=true; controls.autoRotateSpeed=0.4;

const skyMat=new THREE.ShaderMaterial({
  side:THREE.BackSide, depthWrite:false,
  uniforms:{ top:{value:new THREE.Color()}, bottom:{value:new THREE.Color()}, off:{value:18}, exp:{value:0.62} },
  vertexShader:`varying vec3 vW; void main(){ vec4 w=modelMatrix*vec4(position,1.); vW=w.xyz; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
  fragmentShader:`uniform vec3 top,bottom; uniform float off,exp; varying vec3 vW;
    void main(){ float h=normalize(vW+vec3(0.,off,0.)).y; float t=pow(max(h,0.),exp); gl_FragColor=vec4(mix(bottom,top,t),1.);}`
});
scene.add(new THREE.Mesh(new THREE.SphereGeometry(320,32,16), skyMat));

const hemi=new THREE.HemisphereLight(0x8aa0b8,0x3a3020,0.72); scene.add(hemi);
const sun=new THREE.DirectionalLight(0xfff2e0,1.15); sun.position.set(20,70,30); scene.add(sun);
const rim=new THREE.DirectionalLight(0x88aaff,0.35); rim.position.set(-30,40,-40); scene.add(rim);
scene.add(new THREE.AmbientLight(0xffffff,0.12));

/* ── terrain (saturated greens) ── */
const tGeo=new THREE.PlaneGeometry(CFG.terrainSize,CFG.terrainSize,CFG.terrainSeg,CFG.terrainSeg);
tGeo.rotateX(-Math.PI/2);
{
  const p=tGeo.attributes.position, col=new Float32Array(p.count*3);
  const grass=[0.10,0.46,0.08], light=[0.26,0.66,0.10], mud=[0.26,0.24,0.16], rock=[0.42,0.44,0.40];
  const mix=(a,b,t)=>[a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t,a[2]+(b[2]-a[2])*t];
  for(let i=0;i<p.count;i++){
    const x=p.getX(i),z=p.getZ(i),h=heightAt(x,z); p.setY(i,h);
    let c; const j=(hash(x,z)-0.5)*0.06;
    if(h<CFG.waterLevel+0.35) c=mud;
    else if(h<1.6) c=mix(grass,light,Math.max(0,(h+0.5)/2.1));
    else if(h<3.4) c=light;
    else c=mix(light,rock,Math.min(1,(h-3.4)/2));
    col[i*3]=c[0]+j; col[i*3+1]=c[1]+j; col[i*3+2]=c[2]+j;
  }
  tGeo.setAttribute('color',new THREE.BufferAttribute(col,3));
  tGeo.computeVertexNormals();
}
const terrainMesh=new THREE.Mesh(tGeo,new THREE.MeshStandardMaterial({vertexColors:true,roughness:1,metalness:0,flatShading:true}));
scene.add(terrainMesh);

const water=new THREE.Mesh(new THREE.PlaneGeometry(CFG.terrainSize,CFG.terrainSize),
  new THREE.MeshStandardMaterial({color:0x244a60,transparent:true,opacity:0.80,roughness:0.12,metalness:0.4}));
water.rotation.x=-Math.PI/2; water.position.y=CFG.waterLevel; scene.add(water);

/* ── tree geometry helpers ── */
function prep(geo){ return geo.index ? geo.toNonIndexed() : geo; }
function paint(geo, r, g, b){
  geo = prep(geo); geo.deleteAttribute('uv');
  const n=geo.attributes.position.count, c=new Float32Array(n*3);
  for(let i=0;i<n;i++){ c[i*3]=r; c[i*3+1]=g; c[i*3+2]=b; }
  geo.setAttribute('color',new THREE.BufferAttribute(c,3)); return geo;
}
function paintGrad(geo, base, top){
  geo = prep(geo); geo.deleteAttribute('uv');
  const p=geo.attributes.position, n=p.count, c=new Float32Array(n*3);
  let ymin=1e9,ymax=-1e9; for(let i=0;i<n;i++){const y=p.getY(i);if(y<ymin)ymin=y;if(y>ymax)ymax=y;}
  for(let i=0;i<n;i++){const t=(p.getY(i)-ymin)/Math.max(0.001,ymax-ymin);
    c[i*3]=base[0]+(top[0]-base[0])*t;c[i*3+1]=base[1]+(top[1]-base[1])*t;c[i*3+2]=base[2]+(top[2]-base[2])*t;}
  geo.setAttribute('color',new THREE.BufferAttribute(c,3)); return geo;
}
function spruceGeo(){
  const t  = paint(new THREE.CylinderGeometry(0.09,0.16,0.9,6).translate(0,0.45,0), 0.30,0.20,0.12);
  const c1 = paintGrad(new THREE.ConeGeometry(0.78,1.15,7).translate(0,1.35,0), [0.02,0.46,0.58],[0.08,0.66,0.82]);
  const c2 = paintGrad(new THREE.ConeGeometry(0.60,0.98,7).translate(0,1.98,0), [0.05,0.56,0.72],[0.12,0.76,0.92]);
  const c3 = paintGrad(new THREE.ConeGeometry(0.42,0.82,7).translate(0,2.55,0), [0.10,0.68,0.84],[0.18,0.86,1.0]);
  return mergeGeometries([t,c1,c2,c3]);
}
function roundGeo(){
  const t  = paint(new THREE.CylinderGeometry(0.11,0.18,1.0,6).translate(0,0.5,0), 0.32,0.21,0.12);
  const b1 = paintGrad(new THREE.IcosahedronGeometry(0.82,1).translate(0,1.55,0), [0.05,0.55,0.10],[0.16,0.80,0.18]);
  const b2 = paintGrad(new THREE.IcosahedronGeometry(0.55,1).translate(0.35,2.05,0.1), [0.10,0.68,0.16],[0.24,0.92,0.26]);
  return mergeGeometries([t,b1,b2]);
}
function goldenGeo(){
  const t  = paint(new THREE.CylinderGeometry(0.10,0.17,0.95,6).translate(0,0.47,0), 0.32,0.20,0.11);
  const d1 = paintGrad(new THREE.DodecahedronGeometry(0.78,0).translate(0,1.5,0), [0.85,0.46,0.02],[1.0,0.72,0.06]);
  const d2 = paintGrad(new THREE.DodecahedronGeometry(0.50,0).translate(-0.2,2.1,-0.1), [0.95,0.60,0.04],[1.0,0.84,0.12]);
  return mergeGeometries([t,d1,d2]);
}
function oakGeo(){
  const t  = paint(new THREE.CylinderGeometry(0.22,0.42,2.4,7).translate(0,1.2,0), 0.16,0.11,0.07);
  const c1 = paintGrad(new THREE.IcosahedronGeometry(1.7,1).scale(1.25,0.95,1.25).translate(0,3.1,0), [0.06,0.16,0.05],[0.13,0.30,0.09]);

const treeMat=new THREE.MeshStandardMaterial({vertexColors:true,roughness:0.82,metalness:0,flatShading:true});

/* ── placement spots (grove noise stored per spot as `o`) ── */
function buildSpots(){
  const spots=[], half=CFG.terrainSize/2-4, sp=CFG.treeSpacing;
  for(let x=-half;x<=half;x+=sp) for(let z=-half;z<=half;z+=sp){
    const gn=vnoise(x*0.05+50, z*0.05+50);
    if(gn < 0.40) continue;
    const jx=x+(hash(x,z)-0.5)*sp*0.8, jz=z+(hash(z,x)-0.5)*sp*0.8, h=heightAt(jx,jz);
    if(h<CFG.waterLevel+0.25) continue;
    const hx=heightAt(jx+0.6,jz)-heightAt(jx-0.6,jz), hz=heightAt(jx,jz+0.6)-heightAt(jx,jz-0.6);
    if(Math.hypot(hx,hz)/1.2>CFG.maxSlope) continue;
    spots.push({x:jx,y:h,z:jz,d:Math.hypot(jx,jz),o:gn});
  }
  return spots.sort((a,b)=>a.d-b.d);
}
const spots=buildSpots();

/* ── OPTIONAL: build the oak geometry once, fail-soft ── */

  t.sy  = 0.82 + hash(i,11)*0.50;
  t.sxz = 0.85 + hash(i,13)*0.32;
  t.leanX = (hash(i,17)-0.5)*0.10;
  t.leanZ = (hash(i,19)-0.5)*0.10;
  t.oak = OAK_OK && !!oakG && t.qElo >= OAK_THRESHOLD;
  if(t.oak){ t.baseScale *= 0.85; t.sy *= 0.9; t.sxz *= 1.0; t.leanX *= 0.4; t.leanZ *= 0.4; }
  t.rot=hash(i,3)*Math.PI*2; t.cur=0; t.target=0; t.growing=false; t.animT0=0;
});

/* ── placement: oaks get their own open meadows; neighbours keep distance ──
   Wrapped fail-soft: if this ever throws, we fall back to the simple
   center-out carpet so the forest still renders. */
try{
  const OAK_FIELD_MIN=10, OAK_AVOID=7;
  const openSorted=spots.filter(s=>s.o>0.64).sort((a,b)=>a.d-b.d);
  const clearingSpots=[];
  for(const s of openSorted){
    let ok=true;
    for(const c of clearingSpots){ if(Math.hypot(s.x-c.x,s.z-c.z)<OAK_FIELD_MIN){ok=false;break;} }
    if(ok) clearingSpots.push(s);
  }
  const CELL=OAK_AVOID, reserved=new Set();
  const key=(x,z)=>(Math.round(x/CELL)+5000)+','+(Math.round(z/CELL)+5000);
  const markReserved=(x,z)=>{ for(let dx=-1;dx<=1;dx++) for(let dz=-1;dz<=1;dz++) reserved.add(key(x+dx*CELL*0.6,z+dz*CELL*0.6)); };
  let ci=0;
  for(const t of TREES){ if(!t.oak) continue;
    const s = ci<clearingSpots.length ? clearingSpots[ci++] : spots[(t.id*7+13)%spots.length];
    t.x=s.x; t.y=s.y; t.z=s.z; markReserved(t.x,t.z);
  }
  let ni=0;
  for(const t of TREES){ if(t.oak) continue;
    while(ni<spots.length && reserved.has(key(spots[ni].x,spots[ni].z))) ni++;
    const s = ni<spots.length ? spots[ni++] : spots[(t.id*3+5)%spots.length];
    t.x=s.x; t.y=s.y; t.z=s.z;
  }
}catch(e){
  warn('Open-field layout skipped: '+(e&&e.message||e));
  TREES.forEach((t,i)=>{ const s=spots[i%spots.length]; t.x=s.x; t.y=s.y; t.z=s.z; });
}

/* ── build instanced meshes by RENDER species (oak overrides subject visually) ── */
const geos={physics:spruceGeo(),chemistry:roundGeo(),maths:goldenGeo()};

if(oakG) byRender.oak=[];
TREES.forEach(t=>byRender[t.oak?'oak':t.subject].push(t));

const dummy=new THREE.Object3D();
for(const sp of Object.keys(geos)){
  const list=byRender[sp];
  const _cap=Math.max(1,list.length)+200;
  const m=new THREE.InstancedMesh(geos[sp],treeMat,_cap);
  m.instanceMatrix.setUsage(THREE.DynamicDrawUsage); m.frustumCulled=false; m.userData.byIid=[];
  m.userData.cap=_cap; m.userData.nextIid=list.length; m.count=list.length;
  list.forEach((t,iid)=>{ t.mesh=m; t.iid=iid; m.userData.byIid[iid]=t;
    const sc=0.0001;
    dummy.position.set(t.x,t.y-0.06,t.z); dummy.rotation.set(t.leanX,t.rot,t.leanZ);
    dummy.scale.set(t.sxz*sc,t.sy*sc,t.sxz*sc); dummy.updateMatrix(); m.setMatrixAt(iid,dummy.matrix); });
  m.instanceMatrix.needsUpdate=true; scene.add(m); meshes[sp]=m;
}
function updateTree(t){
  const _gf=0.30+0.70*((t.growCur!=null)?t.growCur:1);
  const _bm=1+0.16*(window.__bloom||0);
  const sc=Math.max(0.0001,t.baseScale*t.cur*_gf*_bm);
  dummy.position.set(t.x,t.y-0.06,t.z); dummy.rotation.set(t.leanX,t.rot,t.leanZ);
  dummy.scale.set(t.sxz*sc,t.sy*sc,t.sxz*sc); dummy.updateMatrix();
  t.mesh.setMatrixAt(t.iid,dummy.matrix);
}
/* plant a fresh tree into a species mesh's headroom (used by the SOLVE sim) */
function addTree(t, interactive){
  const sp = t.oak ? 'oak' : t.subject;
  const m = meshes[sp];
  if(!m) return false;
  const iid = m.userData.nextIid;
  if(iid >= m.userData.cap) return false;
  m.userData.nextIid = iid+1;
  t.mesh = m; t.iid = iid; m.userData.byIid[iid] = t;
  const sc = 0.0001;
  dummy.position.set(t.x,t.y-0.06,t.z); dummy.rotation.set(t.leanX||0,t.rot||0,t.leanZ||0);
  dummy.scale.set((t.sxz||1)*sc,(t.sy||1)*sc,(t.sxz||1)*sc); dummy.updateMatrix();
  m.setMatrixAt(iid, dummy.matrix);
  m.count = iid+1; m.instanceMatrix.needsUpdate = true;
  TREES.push(t);
  const hs = window.__forestAPI && window.__forestAPI.onPlanted;
  if(hs){ for(let i=0;i<hs.length;i++){ try{ hs[i](t, !!interactive); }catch(_){} } }
  return true;
}

/* ── OPTIONAL: grass ground cover — fully fail-soft ── */
try{
  function grassClumpGeo(){
    const blade=(rotX,rotY,scl)=>{
      const g=new THREE.BufferGeometry();
      const h=0.5*scl, w=0.06*scl;
      const verts=new Float32Array([
        -w,0,0,  w,0,0,  0,h*0.6,0,
        -w*0.5,h*0.6,0,  w*0.5,h*0.6,0,  0,h,0
      ]);
      g.setAttribute('position', new THREE.BufferAttribute(verts,3));
      const n=verts.length/3, c=new Float32Array(n*3);
      for(let i=0;i<n;i++){ const l=0.25+0.75*(verts[i*3+1]/h); c[i*3]=l; c[i*3+1]=l; c[i*3+2]=l; }
      g.setAttribute('color', new THREE.BufferAttribute(c,3));
      g.computeVertexNormals();
      g.rotateY(rotY); g.rotateX(rotX);

    };
    const parts=[];
    for(let k=0;k<5;k++) parts.push(blade((Math.random()-0.5)*0.3,(k/5)*Math.PI*2+Math.random()*0.6,0.8+Math.random()*0.6));

      `#include <begin_vertex>
       float gw=max(transformed.y,0.0);
       float ph=instanceMatrix[3][0]*0.5+instanceMatrix[3][2]*0.5;
       transformed.x+=sin(uTime*2.0+ph)*gw*0.25 + sin(uTime*3.3+ph*1.7)*gw*0.12;
       transformed.z+=cos(uTime*1.7+ph)*gw*0.12;`);
    grassMat.userData.shader=sh;
  };
  const grassGeo=grassClumpGeo();

    dummy.position.set(x,h-0.05,z); dummy.rotation.set(0,Math.random()*Math.PI*2,0);
    dummy.scale.set(s,s*(0.8+Math.random()*0.6),s); dummy.updateMatrix();
    grass.setMatrixAt(gCount,dummy.matrix);

    grass.setColorAt(gCount,gcol);

const easeOutBack=x=>{const c1=1.70158,c3=c1+1;return 1+c3*Math.pow(x-1,3)+c1*Math.pow(x-1,2);};
let currentRange='year';
const cutoffFor=r=>{const now=Date.now(),D=86400000;
  return r==='week'?now-7*D:r==='month'?now-30*D:r==='year'?now-365*D:0;};
function applyFilter(range,stagger=true){
  currentRange=range; const cut=cutoffFor(range); let gi=0;
  for(const t of TREES){ const on=t.ts>=cut; t.target=on?1:0;
    if(on&&t.cur<0.02){t.growing=true;t.animT0=performance.now()+(stagger?gi*5:0);gi++;}
    else if(!on) t.growing=false; }
  updateHUD();
}
function regrow(){ for(const t of TREES){t.cur=0;t.target=0;t.growing=false;updateTree(t);}
  for(const sp in meshes) meshes[sp].instanceMatrix.needsUpdate=true; applyFilter(currentRange,true); }

function applyTOD(v){
  const t=v/100; let a=TOD[0],b=TOD[TOD.length-1];
  for(let i=0;i<TOD.length-1;i++) if(t>=TOD[i].t&&t<=TOD[i+1].t){a=TOD[i];b=TOD[i+1];break;}
  const f=(t-a.t)/Math.max(0.0001,b.t-a.t), L=(x,y)=>new THREE.Color(x).lerp(new THREE.Color(y),f);
  skyMat.uniforms.top.value.copy(L(a.top,b.top)); skyMat.uniforms.bottom.value.copy(L(a.bot,b.bot));
  sun.color.copy(L(a.sun,b.sun)); sun.intensity=a.sunI+(b.sunI-a.sunI)*f;
  const sp=a.sp.map((x,i)=>x+(b.sp[i]-x)*f); sun.position.set(sp[0]*80,sp[1]*80+5,sp[2]*80);
  hemi.color.copy(L(a.hemi,b.hemi)); hemi.groundColor.copy(skyMat.uniforms.bottom.value).multiplyScalar(0.5);
  scene.fog.color.copy(L(a.fog,b.fog));
  const fire=a.fire+(b.fire-a.fire)*f; fireMat.opacity=fire*0.9; fireflies.visible=fire>0.02;

const clock=new THREE.Clock(); let pickAcc=0, firstFrame=true;
function animate(){
  requestAnimationFrame(animate);
  const dt=clock.getDelta(), el=clock.elapsedTime;
  controls.update();
  if(treeMat.userData.shader) treeMat.userData.shader.uniforms.uTime.value=el;
  if(grassMat && grassMat.userData.shader) grassMat.userData.shader.uniforms.uTime.value=el;
  water.position.y=CFG.waterLevel+Math.sin(el*0.6)*0.03;

  let dirty=false; const now=performance.now();
  for(const t of TREES){ let s;
    if(t.growing){const p=(now-t.animT0)/550; if(p<=0)s=0; else if(p>=1){s=1;t.growing=false;} else s=easeOutBack(p);}
    else {s=t.cur+(t.target-t.cur)*Math.min(1,dt*10); if(Math.abs(t.target-s)<0.002)s=t.target;}
    if(Math.abs(s-t.cur)>0.0006){t.cur=s;updateTree(t);dirty=true;} }
  if(dirty) for(const sp in meshes) meshes[sp].instanceMatrix.needsUpdate=true;

  if(fireflies.visible){const arr=fgeo.attributes.position.array;
    for(let i=0;i<FN;i++){const b=fbase[i];
      arr[i*3]=b.x+Math.sin(el*b.sp+b.ph)*0.6; arr[i*3+1]=b.y+Math.sin(el*b.sp*1.3+b.ph)*0.4;
      arr[i*3+2]=b.z+Math.cos(el*b.sp*0.8+b.ph)*0.6;}
    fgeo.attributes.position.needsUpdate=true;}

  if(birdMesh && birdData && _birdDummy){
    for(let i=0;i<birdData.length;i++){
      const b=birdData[i]; const a=el*b.sp+b.ph;
      const x=b.cx+Math.cos(a)*b.r, z=b.cz+Math.sin(a)*b.r, y=b.hy+Math.sin(a*1.7+b.ph)*1.6;
      const vx=-Math.sin(a)*b.r*b.sp, vz=Math.cos(a)*b.r*b.sp;
      _birdDummy.position.set(x,y,z);
      _birdDummy.rotation.set(0, Math.atan2(vx,vz), 0);
      _birdDummy.scale.setScalar(b.sc);
      _birdDummy.updateMatrix();
      birdMesh.setMatrixAt(i,_birdDummy.matrix);
    }
    birdMesh.instanceMatrix.needsUpdate=true;
    if(birdsMat && birdsMat.userData.shader) birdsMat.userData.shader.uniforms.uTime.value=el;
  }

  const _fh=(window.__forestAPI&&window.__forestAPI.onFrame);
  if(_fh){ for(let _i=0;_i<_fh.length;_i++){ try{ _fh[_i](el,dt); }catch(_){} } }

  pickAcc+=dt; if(pickAcc>0.05){pickAcc=0;pick();}
  renderer.render(scene,camera);
  if(firstFrame){firstFrame=false;setTimeout(()=>document.getElementById('loading').classList.add('gone'),350);}
}

addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);});

/* grow the land on demand: rebuild terrain + water planes bigger. heightAt is
   size-independent, so existing trees stay correctly grounded. Fail-soft: if
   the terrain handle is missing this is a no-op, never a crash. */
function growWorld(delta){
  try{
    delta=delta||48;
    if(typeof terrainMesh==='undefined'||!terrainMesh||!terrainMesh.geometry) return false;
    const newSize=CFG.terrainSize+delta;
    const ng=new THREE.PlaneGeometry(newSize,newSize,CFG.terrainSeg,CFG.terrainSeg);
    ng.rotateX(-Math.PI/2);
    const p=ng.attributes.position, col=new Float32Array(p.count*3);
    const gr=[0.10,0.46,0.08], li=[0.26,0.66,0.10], mu=[0.26,0.24,0.16], ro=[0.42,0.44,0.40];
    const mx=(a,b,t)=>[a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t,a[2]+(b[2]-a[2])*t];
    for(let i=0;i<p.count;i++){
      const x=p.getX(i),z=p.getZ(i),h=heightAt(x,z); p.setY(i,h);
      let c; const j=(hash(x,z)-0.5)*0.06;
      if(h<CFG.waterLevel+0.35) c=mu;
      else if(h<1.6) c=mx(gr,li,Math.max(0,(h+0.5)/2.1));
      else if(h<3.4) c=li;
      else c=mx(li,ro,Math.min(1,(h-3.4)/2));
      col[i*3]=c[0]+j; col[i*3+1]=c[1]+j; col[i*3+2]=c[2]+j;
    }
    ng.setAttribute('color',new THREE.BufferAttribute(col,3));
    ng.computeVertexNormals();
    terrainMesh.geometry.dispose(); terrainMesh.geometry=ng;
    CFG.terrainSize=newSize;
    if(typeof water!=='undefined'&&water&&water.geometry){ water.geometry.dispose(); water.geometry=new THREE.PlaneGeometry(newSize,newSize); }
    return true;
  }catch(e){ console.warn('[forest] growWorld skipped:', e&&e.message||e); return false; }
}
window.__forestAPI = {
  THREE:THREE, scene:scene, SUBJECTS:SUBJECTS, css:css, trees:TREES,
  addTree:addTree, onFrame:[], onPlanted:[],
  topY:function(t){ return t.y + (t.oak?4.2:2.0)*(t.sy||1)*Math.max(0.25, t.cur||0); },
  rebaseTOD:function(){ applyTOD(lastTOD); },
  heightAt:heightAt, pond:{x:-9,z:7}, growWorld:growWorld,
  groundPoint:function(){
    const half=CFG.terrainSize/2-4;
    for(let a=0;a<30;a++){
      const x=(Math.random()*2-1)*half, z=(Math.random()*2-1)*half, h=heightAt(x,z);
      if(h<CFG.waterLevel+0.3) continue;
      const hx=heightAt(x+0.6,z)-heightAt(x-0.6,z), hz=heightAt(x,z+0.6)-heightAt(x,z-0.6);
      if(Math.hypot(hx,hz)/1.2>CFG.maxSlope) continue;
      return {x:x,y:h,z:z};
    }
    return {x:0,y:heightAt(0,0),z:0};
  },
  sun:sun, hemi:hemi, skyBottom:skyMat.uniforms.bottom.value, fogColor:scene.fog.color
};
lastTOD=30; applyTOD(30);
if(TREES.length>spots.length*0.92){ try{ growWorld(40); }catch(_){} }   // insurance: room for the base year
applyFilter('year',true);
animate();

} /* end buildScene */
</script>
