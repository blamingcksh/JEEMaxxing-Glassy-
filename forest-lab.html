<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JEEMaxxing · Growth Forest Lab</title>

  <style>
    :root {
      --bg: #05070a;
      --panel: rgba(10, 12, 18, 0.72);
      --panel-strong: rgba(10, 12, 18, 0.88);
      --line: rgba(255, 255, 255, 0.10);
      --line-strong: rgba(255, 255, 255, 0.18);
      --text: #eef1f6;
      --dim: #9aa3b5;
      --muted: #5b6478;
      --amber: #ffb224;
      --cyan: #3ddcff;
      --green: #22c55e;
      --violet: #a78bfa;
      --display: 'Chakra Petch', 'Space Grotesk', system-ui, sans-serif;
      --num: 'Space Grotesk', ui-monospace, monospace;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: var(--display);
    }

    #forest-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      z-index: 0;
    }

    #lab-loading {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: grid;
      place-items: center;
      background: rgba(5, 7, 10, 0.92);
      color: var(--amber);
      letter-spacing: 4px;
      font-size: 13px;
      font-weight: 700;
      transition: opacity 0.5s ease;
    }

    #lab-loading.done {
      opacity: 0;
      pointer-events: none;
    }

    .lab-ui {
      position: fixed;
      z-index: 20;
      pointer-events: none;
    }

    .lab-top {
      top: 18px;
      left: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: min(92vw, 500px);
    }

    .lab-panel {
      pointer-events: auto;
      background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.08),
        0 20px 50px -25px rgba(0,0,0,0.85);
      backdrop-filter: blur(18px) saturate(140%);
      -webkit-backdrop-filter: blur(18px) saturate(140%);
      padding: 14px 16px;
    }

    .lab-kicker {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2.6px;
      color: var(--cyan);
      margin-bottom: 6px;
    }

    .lab-title {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 0.4px;
      margin-bottom: 10px;
    }

    .lab-periods {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .lab-periods button {
      appearance: none;
      border: 1px solid var(--line-strong);
      background: rgba(255,255,255,0.04);
      color: var(--dim);
      border-radius: 999px;
      padding: 8px 12px;
      font: inherit;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.16s ease;
    }

    .lab-periods button:hover {
      color: #fff;
      border-color: rgba(61,220,255,0.45);
      box-shadow: 0 0 16px rgba(61,220,255,0.18);
      transform: translateY(-1px);
    }

    .lab-periods button.active {
      color: #081014;
      background: linear-gradient(100deg, var(--cyan), #78e6ff);
      border-color: transparent;
      box-shadow: 0 0 22px rgba(61,220,255,0.35);
    }

    .lab-stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .lab-stat {
      background: rgba(255,255,255,0.035);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      min-height: 74px;
    }

    .lab-stat .label {
      font-size: 9px;
      letter-spacing: 1.8px;
      color: var(--dim);
      font-weight: 700;
      margin-bottom: 8px;
    }

    .lab-stat .value {
      font-family: var(--num);
      font-size: 26px;
      font-weight: 800;
      line-height: 1;
      color: #fff;
    }

    .lab-stat .sub {
      margin-top: 6px;
      font-size: 10px;
      color: var(--muted);
    }

    .lab-bottom {
      left: 18px;
      bottom: 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: min(92vw, 360px);
    }

    .lab-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .lab-btn {
      appearance: none;
      border: 1px solid var(--line-strong);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      border-radius: 12px;
      padding: 10px 13px;
      font: inherit;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.16s ease;
    }

    .lab-btn:hover {
      border-color: rgba(255,178,36,0.45);
      box-shadow: 0 0 18px rgba(255,178,36,0.18);
      transform: translateY(-1px);
    }

    .lab-btn.active {
      background: rgba(34,197,94,0.14);
      border-color: rgba(34,197,94,0.45);
      color: #d7ffe4;
    }

    .lab-slider-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .lab-slider-row label {
      font-size: 10px;
      letter-spacing: 1.6px;
      color: var(--dim);
      font-weight: 700;
      white-space: nowrap;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--amber);
    }

    .hud-panel {
      position: fixed;
      z-index: 30;
      background: var(--panel-strong);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: 0 24px 60px -25px rgba(0,0,0,0.9);
      color: var(--text);
    }

    .hud-panel .kicker {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2.4px;
      color: var(--amber);
      margin-bottom: 8px;
    }

    .seg {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .seg button,
    .toggle {
      appearance: none;
      border: 1px solid var(--line-strong);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      border-radius: 10px;
      padding: 8px 10px;
      font: inherit;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .seg button:hover,
    .toggle:hover {
      border-color: rgba(255,178,36,0.45);
      color: #fff;
    }

    .toggle.on {
      background: rgba(34,197,94,0.16);
      border-color: rgba(34,197,94,0.45);
      color: #d9ffe6;
    }

    @media (max-width: 640px) {
      .lab-top {
        top: 10px;
        left: 10px;
        right: 10px;
        max-width: none;
      }

      .lab-bottom {
        left: 10px;
        right: 10px;
        bottom: 10px;
        width: auto;
      }

      .lab-title {
        font-size: 20px;
      }

      .lab-stats {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>

<body>
  <canvas id="forest-canvas"></canvas>

  <div id="lab-loading">SOWING SEEDS…</div>

  <div class="lab-ui lab-top">
    <div class="lab-panel">
      <div class="lab-kicker">// TELEMETRY BIOME</div>
      <div class="lab-title">GROWTH FOREST</div>

      <div class="lab-periods" id="lab-periods">
        <button data-period="365" class="active">LAST 365 DAYS</button>
        <button data-period="week">WEEK</button>
        <button data-period="month">MONTH</button>
        <button data-period="year">YEAR</button>
        <button data-period="all">ALL</button>
      </div>
    </div>

    <div class="lab-panel lab-stats">
      <div class="lab-stat">
        <div class="label">TREES STANDING</div>
        <div class="value" id="stat-trees">0</div>
        <div class="sub">solved questions in range</div>
      </div>

      <div class="lab-stat">
        <div class="label">THIS PERIOD</div>
        <div class="value" id="stat-period">+0</div>
        <div class="sub">vs previous window</div>
      </div>

      <div class="lab-stat">
        <div class="label">ANCIENT OAKS</div>
        <div class="value" id="stat-oaks">0</div>
        <div class="sub">qElo ≥ 2300</div>
      </div>

      <div class="lab-stat">
        <div class="label">TALLEST SPECIMEN</div>
        <div class="value" id="stat-tall">—</div>
        <div class="sub">highest qElo</div>
      </div>
    </div>
  </div>

  <div class="lab-ui lab-bottom">
    <div class="lab-panel">
      <div class="lab-slider-row">
        <label>TIME OF DAY</label>
        <input id="tod" type="range" min="0" max="100" value="50" />
      </div>

      <div class="lab-controls" style="margin-top: 12px;">
        <button id="btn-orbit" class="lab-btn active">⟳ ORBIT</button>
        <button id="btn-regrow" class="lab-btn">↻ REGROW</button>
      </div>
    </div>
  </div>

  <!-- LAB-ONLY juice layer -->
  <script src="./forest-juice.js"></script>

  <script type="module">
    (function () {
      ' strict';

      const canvas = document.getElementById('forest-canvas');
      const loading = document.getElementById('lab-loading');

      let THREE = null;
      let renderer, scene, camera, treeMat, dummy;

      const env = {};
      const meshes = {};
      const counts = { physics: 0, chemistry: 0, maths: 0, oak: 0 };
      const trees = [];
      let drySpots = [];

      const CAP = 5000;
      const WL = -1.1;
      const POND = { x: -9, z: 7 };
      let WORLD_HALF = 180;

      let orbit = 0;
      let autoOrbit = true;
      let elT = 0;
      let last = 0;
      let currentPeriod = '365';
      let externalBank = null;
      let lastSig = '';

      const hooks = {
        onFrame: [],
        onPlanted: []
      };

      let SUBJECTS = {};

      const TOD = [
        { t: 0,   top: 0x0a0e1c, bot: 0x141a2a, sun: 0x3a4a6a, sunI: 0.15, hemi: 0x2a3040, fog: 0x0e1220 },
        { t: 22,  top: 0x2a3a5e, bot: 0xe8956a, sun: 0xffb27a, sunI: 0.70, hemi: 0x5a5a6a, fog: 0x3a3040 },
        { t: 50,  top: 0x4a7ec0, bot: 0xc4dcec, sun: 0xfff2e0, sunI: 1.15, hemi: 0x8aa0b8, fog: 0x9ab4c8 },
        { t: 78,  top: 0x3a2a52, bot: 0xe07a44, sun: 0xff8a4a, sunI: 0.75, hemi: 0x6a5060, fog: 0x4a3444 },
        { t: 100, top: 0x0a0e1c, bot: 0x141a2a, sun: 0x3a4a6a, sunI: 0.15, hemi: 0x2a3040, fog: 0x0e1220 }
      ];

      /* ── utils ── */
      function hash(x, z) {
        const n = Math.sin(x * 127.1 + z * 311.7) * 43758.5453;
        return n - Math.floor(n);
      }

      function vnoise(x, z) {
        const xi = Math.floor(x), zi = Math.floor(z);
        const xf = x - xi, zf = z - zi;
        const u = xf * xf * (3 - 2 * xf);
        const v = zf * zf * (3 - 2 * zf);
        const a = hash(xi, zi), b = hash(xi + 1, zi), c = hash(xi, zi + 1), d = hash(xi + 1, zi + 1);
        return a * (1 - u) * (1 - v) + b * u * (1 - v) + c * (1 - u) * v + d * u * v;
      }

      function heightAt(x, z) {
        let h =
          (vnoise(x * 0.035, z * 0.035) - 0.5) * 8 +
          (vnoise(x * 0.09, z * 0.09) - 0.5) * 2.5 +
          (vnoise(x * 0.2, z * 0.2) - 0.5) * 0.8;

        const dd = Math.hypot(x - POND.x, z - POND.z);
        h -= Math.max(0, 3.4 - dd * 0.5);
        return h;
      }

      function realTOD() {
        const d = new Date();
        return ((d.getHours() + d.getMinutes() / 60) / 24) * 100;
      }

      function normSub(s) {
        s = (s || '').toString().toLowerCase().trim();
        if (s === 'math' || s === 'mathematics') return 'maths';
        return s === 'physics' || s === 'chemistry' || s === 'maths' ? s : 'physics';
      }

      function easeOutBack(x) {
        const c1 = 1.70158;
        const c3 = c1 + 1;
        return 1 + c3 * Math.pow(x - 1, 3) + c1 * Math.pow(x - 1, 2);
      }

      /* ── data source ── */
      function getBank() {
        try {
          if (window.parent && window.parent !== window && Array.isArray(window.parent.questionBank) && window.parent.questionBank.length) {
            return window.parent.questionBank;
          }
        } catch (e) {}

        try {
          if (window.opener && Array.isArray(window.opener.questionBank) && window.opener.questionBank.length) {
            return window.opener.questionBank;
          }
        } catch (e) {}

        if (Array.isArray(externalBank) && externalBank.length) return externalBank;

        try {
          if (Array.isArray(window.questionBank) && window.questionBank.length) return window.questionBank;
        } catch (e) {}

        try {
          const raw = localStorage.getItem('jeemax_question_bank') || localStorage.getItem('questionBank');
          if (raw) {
            const parsed = JSON.parse(raw);
            if (Array.isArray(parsed) && parsed.length) return parsed;
          }
        } catch (e) {}

        return [];
      }

      function questionTime(q) {
        const s = q.lastReviewedAt || q.solvedAt || q.createdAt || q.date || q.ts;
        if (!s) return null;
        const t = new Date(s).getTime();
        return isNaN(t) ? null : t;
      }

      function periodStart(key) {
        const now = Date.now();
        if (key === 'week') return now - 7 * 86400000;
        if (key === 'month') return now - 30 * 86400000;
        if (key === 'year' || key === '365') return now - 365 * 86400000;
        return 0;
      }

      function solvedInPeriod() {
        const bank = getBank();
        const start = periodStart(currentPeriod);
        const out = [];

        for (let i = 0; i < bank.length; i++) {
          const q = bank[i];
          if (!q || q.status !== 'solved') continue;

          if (currentPeriod === 'all') {
            out.push(q);
            continue;
          }

          const t = questionTime(q);
          if (t != null && t >= start) out.push(q);
        }

        return out;
      }

      function periodDelta(list) {
        const bank = getBank();

        if (currentPeriod === 'all') {
          const today = new Date();
          today.setHours(0, 0, 0, 0);
          const ms = today.getTime();

          return list.filter(q => {
            const t = questionTime(q);
            return t != null && t >= ms;
          }).length;
        }

        const len = currentPeriod === 'week' ? 7 : currentPeriod === 'month' ? 30 : 365;
        const now = Date.now();
        const start = now - len * 86400000;
        const prevStart = start - len * 86400000;

        let prev = 0;

        bank.forEach(q => {
          if (!q || q.status !== 'solved') return;
          const t = questionTime(q);
          if (t != null && t >= prevStart && t < start) prev++;
        });

        return list.length - prev;
      }

      function bankSig() {
        const bank = getBank();
        let solved = 0;
        for (let i = 0; i < bank.length; i++) {
          if (bank[i] && bank[i].status === 'solved') solved++;
        }
        return bank.length + ':' + solved + ':' + currentPeriod;
      }

      /* ── three loading ── */
      function loadThree() {
        const urls = [
          'https://esm.sh/three@0.160.0',
          'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js',
          'https://unpkg.com/three@0.160.0/build/three.module.js'
        ];

        function tryOne(i) {
          return new Promise(function (res, rej) {
            if (i >= urls.length) return rej(new Error('CDN fail'));
            import(urls[i]).then(res).catch(function () {
              tryOne(i + 1).then(res, rej);
            });
          });
        }

        return tryOne(0);
      }

      /* ── geometry helpers ── */
      function prep(g) {
        return g.index ? g.toNonIndexed() : g;
      }

      function paint(g, r, gr, b) {
        g = prep(g);
        g.deleteAttribute('uv');
        const n = g.attributes.position.count;
        const c = new Float32Array(n * 3);
        for (let i = 0; i < n; i++) {
          c[i * 3] = r;
          c[i * 3 + 1] = gr;
          c[i * 3 + 2] = b;
        }
        g.setAttribute('color', new THREE.BufferAttribute(c, 3));
        return g;
      }

      function paintGrad(g, base, top) {
        g = prep(g);
        g.deleteAttribute('uv');
        const p = g.attributes.position;
        const n = p.count;
        const c = new Float32Array(n * 3);
        let ymin = 1e9, ymax = -1e9;

        for (let i = 0; i < n; i++) {
          const y = p.getY(i);
          if (y < ymin) ymin = y;
          if (y > ymax) ymax = y;
        }

        for (let j = 0; j < n; j++) {
          const t = (p.getY(j) - ymin) / Math.max(0.001, ymax - ymin);
          c[j * 3] = base[0] + (top[0] - base[0]) * t;
          c[j * 3 + 1] = base[1] + (top[1] - base[1]) * t;
          c[j * 3 + 2] = base[2] + (top[2] - base[2]) * t;
        }

        g.setAttribute('color', new THREE.BufferAttribute(c, 3));
        return g;
      }

      function mergeGeos(list) {
        list = list.map(g => g.index ? g.toNonIndexed() : g);
        let n = 0;
        list.forEach(g => n += g.attributes.position.count);

        const pos = new Float32Array(n * 3);
        const nor = new Float32Array(n * 3);
        const col = new Float32Array(n * 3);
        let o = 0;

        list.forEach(g => {
          const c = g.attributes.position.count;
          pos.set(g.attributes.position.array, o * 3);
          if (g.attributes.normal) nor.set(g.attributes.normal.array, o * 3);
          if (g.attributes.color) col.set(g.attributes.color.array, o * 3);
          o += c;
        });

        const g = new THREE.BufferGeometry();
        g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        g.setAttribute('normal', new THREE.BufferAttribute(nor, 3));
        g.setAttribute('color', new THREE.BufferAttribute(col, 3));
        return g;
      }

      function spruceGeo() {
        const t = paint(new THREE.CylinderGeometry(0.09, 0.16, 0.9, 6).translate(0, 0.45, 0), 0.30, 0.20, 0.12);
        const c1 = paintGrad(new THREE.ConeGeometry(0.78, 1.15, 7).translate(0, 1.35, 0), [0.02, 0.46, 0.58], [0.10, 0.66, 0.82]);
        const c2 = paintGrad(new THREE.ConeGeometry(0.60, 0.98, 7).translate(0, 1.98, 0), [0.05, 0.56, 0.72], [0.15, 0.76, 0.92]);
        const c3 = paintGrad(new THREE.ConeGeometry(0.42, 0.82, 7).translate(0, 2.55, 0), [0.10, 0.68, 0.84], [0.22, 0.80, 0.92]);
        return mergeGeos([t, c1, c2, c3]);
      }

      function roundGeo() {
        const t = paint(new THREE.CylinderGeometry(0.11, 0.18, 1.0, 6).translate(0, 0.5, 0), 0.32, 0.21, 0.12);
        const b1 = paintGrad(new THREE.IcosahedronGeometry(0.82, 1).translate(0, 1.55, 0), [0.05, 0.55, 0.10], [0.16, 0.80, 0.18]);
        const b2 = paintGrad(new THREE.IcosahedronGeometry(0.55, 1).translate(0.35, 2.05, 0.1), [0.10, 0.68, 0.16], [0.24, 0.92, 0.26]);
        return mergeGeos([t, b1, b2]);
      }

      function goldenGeo() {
        const t = paint(new THREE.CylinderGeometry(0.10, 0.17, 0.95, 6).translate(0, 0.47, 0), 0.32, 0.20, 0.11);
        const d1 = paintGrad(new THREE.DodecahedronGeometry(0.78, 0).translate(0, 1.5, 0), [0.85, 0.46, 0.02], [1.0, 0.72, 0.06]);
        const d2 = paintGrad(new THREE.DodecahedronGeometry(0.50, 0).translate(-0.2, 2.1, -0.1), [0.95, 0.60, 0.04], [1.0, 0.84, 0.12]);
        return mergeGeos([t, d1, d2]);
      }

      function oakGeo() {
        const t = paint(new THREE.CylinderGeometry(0.22, 0.42, 2.4, 7).translate(0, 1.2, 0), 0.16, 0.11, 0.07);
        const c1 = paintGrad(new THREE.IcosahedronGeometry(1.7, 1).scale(1.25, 0.95, 1.25).translate(0, 3.1, 0), [0.06, 0.16, 0.05], [0.13, 0.30, 0.09]);
        const c2 = paintGrad(new THREE.IcosahedronGeometry(1.35, 1).scale(1.2, 0.9, 1.2).translate(0.7, 3.9, 0.4), [0.08, 0.20, 0.06], [0.16, 0.36, 0.12]);
        const c3 = paintGrad(new THREE.IcosahedronGeometry(1.2, 1).scale(1.15, 0.9, 1.15).translate(-0.6, 3.8, -0.3), [0.07, 0.18, 0.06], [0.15, 0.34, 0.11]);
        const c4 = paintGrad(new THREE.IcosahedronGeometry(1.0, 1).scale(1.1, 0.85, 1.1).translate(0.1, 4.5, 0.1), [0.10, 0.24, 0.07], [0.19, 0.42, 0.14]);
        return mergeGeos([t, c1, c2, c3, c4]);
      }

      /* ── world build ── */
      function buildDrySpots() {
        drySpots = [];
        const sp = 2.4;

        for (let x = -WORLD_HALF; x <= WORLD_HALF; x += sp) {
          for (let z = -WORLD_HALF; z <= WORLD_HALF; z += sp) {
            const h = heightAt(x, z);
            if (h < WL + 0.25) continue;

            const hx = heightAt(x + 0.6, z) - heightAt(x - 0.6, z);
            const hz = heightAt(x, z + 0.6) - heightAt(x, z - 0.6);
            if (Math.hypot(hx, hz) / 1.2 > 0.6) continue;

            drySpots.push({ x, y: h, z });
          }
        }
      }

      function buildTerrain() {
        const seg = 150;
        const tGeo = new THREE.PlaneGeometry(WORLD_HALF * 2, WORLD_HALF * 2, seg, seg);
        tGeo.rotateX(-Math.PI / 2);

        const p = tGeo.attributes.position;
        const col = new Float32Array(p.count * 3);

        const gr = [0.10, 0.46, 0.08];
        const li = [0.26, 0.66, 0.10];
        const mu = [0.26, 0.24, 0.16];
        const ro = [0.42, 0.44, 0.40];

        function mx(a, b, t) {
          return [
            a[0] + (b[0] - a[0]) * t,
            a[1] + (b[1] - a[1]) * t,
            a[2] + (b[2] - a[2]) * t
          ];
        }

        for (let i = 0; i < p.count; i++) {
          const x = p.getX(i);
          const z = p.getZ(i);
          const h = heightAt(x, z);
          p.setY(i, h);

          let c;
          const j = (hash(x, z) - 0.5) * 0.06;

          if (h < WL + 0.35) c = mu;
          else if (h < 1.6) c = mx(gr, li, Math.max(0, (h + 0.5) / 2.1));
          else if (h < 3.4) c = li;
          else c = mx(li, ro, Math.min(1, (h - 3.4) / 2));

          col[i * 3] = c[0] + j;
          col[i * 3 + 1] = c[1] + j;
          col[i * 3 + 2] = c[2] + j;
        }

        tGeo.setAttribute('color', new THREE.BufferAttribute(col, 3));
        tGeo.computeVertexNormals();

        const land = new THREE.Mesh(
          tGeo,
          new THREE.MeshStandardMaterial({
            vertexColors: true,
            roughness: 1,
            metalness: 0,
            flatShading: true
          })
        );

        scene.add(land);

        const water = new THREE.Mesh(
          new THREE.PlaneGeometry(WORLD_HALF * 2, WORLD_HALF * 2),
          new THREE.MeshStandardMaterial({
            color: 0x244a60,
            transparent: true,
            opacity: 0.8,
            roughness: 0.12,
            metalness: 0.4
          })
        );

        water.rotation.x = -Math.PI / 2;
        water.position.y = WL;
        scene.add(water);
        env.water = water;
      }

      function buildSkyLights() {
        const skyMat = new THREE.ShaderMaterial({
          side: THREE.BackSide,
          depthWrite: false,
          uniforms: {
            top: { value: new THREE.Color() },
            bottom: { value: new THREE.Color() },
            off: { value: 18 },
            exp: { value: 0.62 }
          },
          vertexShader: `
            varying vec3 vW;
            void main() {
              vec4 w = modelMatrix * vec4(position, 1.0);
              vW = w.xyz;
              gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
          `,
          fragmentShader: `
            uniform vec3 top;
            uniform vec3 bottom;
            uniform float off;
            uniform float exp;
            varying vec3 vW;
            void main() {
              float h = normalize(vW + vec3(0.0, off, 0.0)).y;
              float t = pow(max(h, 0.0), exp);
              gl_FragColor = vec4(mix(bottom, top, t), 1.0);
            }
          `
        });

        env.skyTop = skyMat.uniforms.top.value;
        env.skyBot = skyMat.uniforms.bottom.value;

        scene.add(new THREE.Mesh(new THREE.SphereGeometry(420, 32, 16), skyMat));

        env.hemi = new THREE.HemisphereLight(0x8aa0b8, 0x3a3020, 0.72);
        scene.add(env.hemi);

        env.sun = new THREE.DirectionalLight(0xfff2e0, 1.15);
        env.sun.position.set(20, 70, 30);
        scene.add(env.sun);

        scene.add(new THREE.AmbientLight(0xffffff, 0.12));

        scene.fog = new THREE.FogExp2(0x0e1220, 0.0045);
        env.fog = scene.fog;
      }

      function buildTrees() {
        treeMat = new THREE.MeshStandardMaterial({
          vertexColors: true,
          roughness: 0.82,
          metalness: 0,
          flatShading: true
        });

        treeMat.onBeforeCompile = function (sh) {
          sh.uniforms.uTime = { value: 0 };

          sh.vertexShader = 'uniform float uTime;\n' + sh.vertexShader.replace(
            '#include <begin_vertex>',
            `#include <begin_vertex>
            float sw = max(transformed.y - 0.7, 0.0);
            float ph = instanceMatrix[3][0] * 0.6 + instanceMatrix[3][2] * 0.6;
            transformed.x += sin(uTime * 1.3 + ph) * sw * 0.030;
            transformed.z += cos(uTime * 1.0 + ph) * sw * 0.024;`
          );

          treeMat.userData.shader = sh;
        };

        const geos = {
          physics: spruceGeo(),
          chemistry: roundGeo(),
          maths: goldenGeo(),
          oak: oakGeo()
        };

        dummy = new THREE.Object3D();

        for (const k in geos) {
          const m = new THREE.InstancedMesh(geos[k], treeMat, CAP);
          m.frustumCulled = false;
          m.count = 0;
          m.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
          scene.add(m);
          meshes[k] = m;
        }
      }

      function applyTOD(v) {
        if (!env.skyTop) return;

        let a = TOD[0];
        let b = TOD[TOD.length - 1];

        for (let i = 0; i < TOD.length - 1; i++) {
          if (v >= TOD[i].t && v <= TOD[i + 1].t) {
            a = TOD[i];
            b = TOD[i + 1];
            break;
          }
        }

        const f = (v - a.t) / Math.max(0.0001, b.t - a.t);

        function L(x, y) {
          return new THREE.Color(x).lerp(new THREE.Color(y), f);
        }

        env.skyTop.copy(L(a.top, b.top));
        env.skyBot.copy(L(a.bot, b.bot));
        env.sun.color.copy(L(a.sun, b.sun));
        env.sun.intensity = a.sunI + (b.sunI - a.sunI) * f;
        env.sun.position.set((v / 100 - 0.5) * 160, 70, 30);
        env.hemi.color.copy(L(a.hemi, b.hemi));
        env.hemi.groundColor.copy(env.skyBot).multiplyScalar(0.5);
        env.fog.color.copy(L(a.fog, b.fog));
      }

      function rebaseTOD() {
        const slider = document.getElementById('tod');
        applyTOD(slider ? parseFloat(slider.value) : realTOD());
      }

      /* ── tree placement / API ── */
      function placement(i) {
        if (!drySpots.length) return { x: 0, y: 0, z: 0 };

        const s = drySpots[i % drySpots.length];
        let x = s.x + (hash(i, 5) - 0.5) * 1.4;
        let z = s.z + (hash(i, 6) - 0.5) * 1.4;
        let y = heightAt(x, z);

        if (y < WL + 0.25) {
          x = s.x;
          z = s.z;
          y = s.y;
        }

        return { x, y, z };
      }

      function groundPoint() {
        if (!drySpots.length) return { x: 0, y: 0, z: 0 };

        const s = drySpots[(Math.random() * drySpots.length) | 0];
        const x = s.x + (Math.random() - 0.5) * 1.2;
        const z = s.z + (Math.random() - 0.5) * 1.2;
        const y = Math.max(WL + 0.3, heightAt(x, z));

        return { x, y, z };
      }

      function writeTree(t) {
        const g = t.cur || 0;
        const sc = Math.max(0.0001, (t.baseScale || 1) * g);

        dummy.position.set(t.x, t.y - 0.06, t.z);
        dummy.rotation.set(t.leanX || 0, t.rot || 0, t.leanZ || 0);
        dummy.scale.set((t.sxz || 1) * sc, (t.sy || 1) * sc, (t.sxz || 1) * sc);
        dummy.updateMatrix();

        t.mesh.setMatrixAt(t.iid, dummy.matrix);
      }

      function topY(t) {
        const sc = (t.baseScale || 1) * (t.sy || 1) * Math.max(0.2, t.cur || 1);
        return (t.y || 0) + 2.1 * Math.max(0.2, sc);
      }

      function firePlanted(t, interactive) {
        for (let i = 0; i < hooks.onPlanted.length; i++) {
          try { hooks.onPlanted[i](t, interactive); } catch (e) {}
        }
      }

      function addTree(t, interactive) {
        const k = t.oak ? 'oak' : normSub(t.subject);
        if (!meshes[k]) return false;
        if (counts[k] >= CAP) return false;

        t.subject = normSub(t.subject);
        t.kind = k;
        t.mesh = meshes[k];
        t.iid = counts[k]++;

        if (t.cur == null) t.cur = 0;
        if (t.target == null) t.target = 1;
        if (!t.animT0) t.animT0 = performance.now();

        writeTree(t);

        meshes[k].count = counts[k];
        meshes[k].instanceMatrix.needsUpdate = true;

        trees.push(t);
        firePlanted(t, !!interactive);

        return true;
      }

      function makeTreeFromQuestion(q, i) {
        const qElo = q.qElo || 1200;
        const oak = qElo >= 2300;
        const p = placement(i);

        return {
          id: q.id || ('q-' + i),
          ts: questionTime(q) || Date.now(),
          subject: normSub(q.subject),
          qElo,
          oak,
          x: p.x,
          y: p.y,
          z: p.z,
          baseScale: (0.55 + Math.min(1, Math.max(0, (qElo - 800) / 2200)) * 1.1 + (hash(i, 7) - 0.5) * 0.16) * (oak ? 0.85 : 1),
          sy: (0.82 + hash(i, 11) * 0.5) * (oak ? 0.95 : 1),
          sxz: 0.85 + hash(i, 13) * 0.32,
          leanX: (hash(i, 17) - 0.5) * 0.1 * (oak ? 0.4 : 1),
          leanZ: (hash(i, 19) - 0.5) * 0.1 * (oak ? 0.4 : 1),
          rot: hash(i, 3) * Math.PI * 2,
          cur: 1,
          target: 1
        };
      }

      function updateStats(list) {
        document.getElementById('stat-trees').textContent = list.length;

        const d = periodDelta(list);
        document.getElementById('stat-period').textContent = (d >= 0 ? '+' : '') + d;

        const oaks = list.filter(q => (q.qElo || 1200) >= 2300).length;
        document.getElementById('stat-oaks').textContent = oaks;

        let max = 0;
        list.forEach(q => {
          const e = q.qElo || 1200;
          if (e > max) max = e;
        });

        document.getElementById('stat-tall').textContent = max ? Math.round(max) : '—';
      }

      function rebuild() {
        if (!THREE) return;

        for (const k in counts) {
          counts[k] = 0;
          if (meshes[k]) {
            meshes[k].count = 0;
            meshes[k].instanceMatrix.needsUpdate = true;
          }
        }

        trees.length = 0;

        const list = solvedInPeriod();

        for (let i = 0; i < list.length; i++) {
          const t = makeTreeFromQuestion(list[i], i);
          addTree(t, false);
        }

        updateStats(list);
        loading.classList.add('done');
      }

      /* ── render loop ── */
      function frame(t) {
        requestAnimationFrame(frame);

        const dt = Math.min(0.05, (t - last) / 1000 || 0);
        last = t;
        elT += dt;

        if (autoOrbit) orbit += dt * 0.06;

        camera.position.set(Math.sin(orbit) * 140, 95, Math.cos(orbit) * 140);
        camera.lookAt(0, 4, 0);

        if (env.water) env.water.position.y = WL + Math.sin(elT * 0.6) * 0.04;
        if (treeMat && treeMat.userData.shader) treeMat.userData.shader.uniforms.uTime.value = elT;

        const now = performance.now();
        const dirty = {};

        for (let i = 0; i < trees.length; i++) {
          const tr = trees[i];
          if ((tr.cur || 0) < (tr.target || 1)) {
            const p = (now - (tr.animT0 || now)) / 700;
            let g;

            if (p <= 0) g = 0;
            else if (p >= 1) {
              g = tr.target || 1;
              tr.cur = g;
            } else {
              g = easeOutBack(p) * (tr.target || 1);
              tr.cur = g;
            }

            writeTree(tr);
            dirty[tr.kind] = true;
          }
        }

        for (const k in dirty) {
          if (meshes[k]) meshes[k].instanceMatrix.needsUpdate = true;
        }

        for (let i = 0; i < hooks.onFrame.length; i++) {
          try { hooks.onFrame[i](elT, dt); } catch (e) {}
        }

        renderer.render(scene, camera);
      }

      function startLoop() {
        last = performance.now();
        requestAnimationFrame(frame);
      }

      /* ── UI ── */
      function wireUI() {
        const periodWrap = document.getElementById('lab-periods');
        const slider = document.getElementById('tod');
        const orbitBtn = document.getElementById('btn-orbit');
        const regrowBtn = document.getElementById('btn-regrow');

        slider.value = Math.round(realTOD());

        slider.addEventListener('input', function () {
          applyTOD(parseFloat(slider.value));
        });

        orbitBtn.addEventListener('click', function () {
          autoOrbit = !autoOrbit;
          orbitBtn.classList.toggle('active', autoOrbit);
        });

        regrowBtn.addEventListener('click', function () {
          rebuild();
        });

        periodWrap.addEventListener('click', function (e) {
          const btn = e.target.closest('button');
          if (!btn) return;

          currentPeriod = btn.dataset.period || '365';

          periodWrap.querySelectorAll('button').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');

          rebuild();
        });
      }

      /* ── boot ── */
      function buildWorld() {
        renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setPixelRatio(Math.min(devicePixelRatio, 1.5));
        renderer.setSize(innerWidth, innerHeight);
        renderer.setClearColor(0x05070a, 1);

        scene = new THREE.Scene();

        camera = new THREE.PerspectiveCamera(48, innerWidth / innerHeight, 0.1, 900);
        camera.position.set(0, 95, 140);
        camera.lookAt(0, 4, 0);

        SUBJECTS = {
          physics: { color: new THREE.Color(0x3ddcff) },
          chemistry: { color: new THREE.Color(0x22c55e) },
          maths: { color: new THREE.Color(0xffb224) },
          oak: { color: new THREE.Color(0xd9a066) }
        };

        buildSkyLights();
        buildTerrain();
        buildDrySpots();
        buildTrees();
        applyTOD(realTOD());
        wireUI();

        window.__forestAPI = {
          version: 'lab-base-1',
          THREE,
          scene,
          camera,
          trees,
          meshes,
          counts,
          pond: POND,
          SUBJECTS,
          onFrame: hooks.onFrame,
          onPlanted: hooks.onPlanted,
          groundPoint,
          heightAt,
          topY,
          addTree,
          rebaseTOD,
          sun: env.sun,
          hemi: env.hemi,
          skyTop: env.skyTop,
          skyBottom: env.skyBot,
          growWorld: function () {
            return false;
          }
        };

        rebuild();
        startLoop();

        setInterval(function () {
          const sig = bankSig();
          if (sig !== lastSig) {
            lastSig = sig;
            rebuild();
          }
        }, 4000);

        window.addEventListener('resize', function () {
          if (!renderer || !camera) return;
          renderer.setSize(innerWidth, innerHeight);
          camera.aspect = innerWidth / innerHeight;
          camera.updateProjectionMatrix();
        });

        window.addEventListener('message', function (e) {
          if (e.data && e.data.type === 'JEEMAX_FOREST_DATA' && Array.isArray(e.data.questionBank)) {
            externalBank = e.data.questionBank;
            rebuild();
          }
        });
      }

      loadThree()
        .then(function (m) {
          THREE = m;
          buildWorld();
        })
        .catch(function () {
          loading.textContent = 'COULD NOT LOAD 3D ENGINE';
        });
    })();
  </script>
</body>
</html>
